name = "freellmapi-cf"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# ---------------- D1 数据库 ----------------
[[d1_databases]]
binding = "DB"
database_name = "freellmapi"
database_id = "da670d36-163c-4821-8835-81bbe34f22b4"

# ---------------- KV 命名空间 ----------------
[[kv_namespaces]]
binding = "CONFIG"
id = "485e0471ac964d6daf9749e3710aca61"

# ---------------- Durable Objects ----------------
[[durable_objects.bindings]]
name = "KEY_STATE"
class_name = "KeyState"

[[durable_objects.bindings]]
name = "SESSION"
class_name = "Session"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["KeyState", "Session"]

# ---------------- Cron Triggers ----------------
[triggers]
crons = ["0 */12 * * *"]  # 每 12 小时同步一次模型目录

# ---------------- 环境变量 ----------------
[vars]
ENVIRONMENT = "production"
SESSION_TTL_MINUTES = "30"
RATE_LIMIT_WINDOW_SECONDS = "60"
RATE_LIMIT_MAX_REQUESTS = "60"

# ---------------- Secrets（敏感） ----------------
# ENCRYPTION_KEY, JWT_SECRET, ADMIN_BOOTSTRAP_CODE 在 GitHub Actions 里设置
